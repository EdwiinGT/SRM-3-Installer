# =============================================================================
#  SRM-3-Installer — Configuración por defecto
# -----------------------------------------------------------------------------
#  Todos los valores pueden sobreescribirse exportando la variable antes de
#  ejecutar install.sh. Ej:  INSTALL_DIR=/srv/srm sudo -E ./install.sh
#  Estos valores respetan EXACTAMENTE la arquitectura oficial de SRM-3.
# =============================================================================

# ---- Repositorio del proyecto principal (SOLO se clona, nunca se modifica) ---
SRM_REPO_URL="${SRM_REPO_URL:-https://github.com/EdwiinGT/SRM-3.git}"
SRM_BRANCH="${SRM_BRANCH:-}"            # vacío = rama por defecto del repo

# ---- Rutas y usuario de sistema ---------------------------------------------
INSTALL_DIR="${INSTALL_DIR:-/opt/srm}"  # ruta oficial de despliegue
SRM_USER="${SRM_USER:-srm}"             # usuario de sistema que ejecuta el backend

# ---- Base de datos (automático, NO se pregunta al usuario) ------------------
DB_NAME="${DB_NAME:-srm_restaurant}"                # nombre oficial de la BD
MONGO_URL="${MONGO_URL:-mongodb://localhost:27017}" # solo loopback
APP_NAME="${APP_NAME:-srm-restaurant}"

# ---- Backend FastAPI / Uvicorn ----------------------------------------------
BACKEND_HOST="${BACKEND_HOST:-127.0.0.1}"
BACKEND_PORT="${BACKEND_PORT:-8001}"
BACKEND_WORKERS="${BACKEND_WORKERS:-2}"
SERVICE_NAME="${SERVICE_NAME:-srm-backend}"

# ---- Versiones de dependencias ----------------------------------------------
NODE_MAJOR="${NODE_MAJOR:-20}"          # Node.js 20 LTS (óptimo para React 19)
MONGO_VERSION="${MONGO_VERSION:-8.0}"   # MongoDB 8.0 (soporte oficial noble/24.04)

# ---- Sistema operativo esperado ---------------------------------------------
UBUNTU_CODENAME_EXPECTED="${UBUNTU_CODENAME_EXPECTED:-noble}"  # Ubuntu 24.04 LTS
UBUNTU_VERSION_EXPECTED="${UBUNTU_VERSION_EXPECTED:-24.04}"

# ---- Comportamiento ----------------------------------------------------------
# Si es "true" y el DNS no valida, la instalación se cancela en lugar de
# continuar sin HTTPS (útil para automatizaciones que exigen TLS).
SRM_REQUIRE_HTTPS="${SRM_REQUIRE_HTTPS:-false}"
